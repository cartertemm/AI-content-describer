# Ruff configuration for the AI Content Describer NVDA add-on.
# The project uses tabs for indentation throughout.

line-length = 110

# Functions the add-on treats as built-in (gettext translation lookups).
builtins = ["_", "ngettext", "pgettext", "npgettext"]

exclude = [".git", "__pycache__"]

[lint]
# Default rules (E4, E7, E9, F) plus mccabe complexity.
select = ["E4", "E7", "E9", "F", "C901"]
# Third-party libs are imported after dependency_checker.expand_path() puts them
# on sys.path, so module-level imports legitimately appear below that call.
ignore = ["E402"]

[lint.mccabe]
max-complexity = 15

[format]
indent-style = "tab"
